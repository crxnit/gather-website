server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── Disable ETag / Last-Modified (prevent conditional caching) ──
    etag off;
    if_modified_since off;

    # ── Gzip ─────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # ── No-cache HTML (always serve latest pages) ────────────────────
    location ~* \.html$ {
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Last-Modified "" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # ── Cache CSS/JS (cache-busted via ?v=<timestamp> on every build) ──
    location ~* \.(css|js)$ {
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Cache images/fonts (cache-busted via ?v=<timestamp>) ───────
    location ~* \.(jpg|jpeg|png|gif|svg|webp|ico|woff2?)$ {
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA-friendly fallback (clean URLs) ───────────────────────────
    location / {
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Last-Modified "" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ $uri.html =404;
    }

    # ── Custom error page ────────────────────────────────────────────
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # ── Block dotfiles ───────────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Block non-public directories ─────────────────────────────────
    location ~* ^/(apps-script|archive|deploy|html-v1|node_modules|src)/ {
        deny all;
        return 404;
    }

    # ── Block dev/config files from being served ─────────────────────
    location ~* (BUILD\.md|CLAUDE\.md|README\.md|\.txt|docker-compose|Dockerfile)$ {
        deny all;
        return 404;
    }
}
