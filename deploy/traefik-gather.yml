http:
  # ── Routers ──────────────────────────────────────────────────────

  routers:
    # Primary domain (non-www)
    gather-main:
      rule: "Host(`gathercateringandevents.com`)"
      entryPoints:
        - websecure
      service: gather-web
      middlewares:
        - gather-hsts
      tls:
        certResolver: letsencrypt

    # Strip www from primary domain
    gather-www:
      rule: "Host(`www.gathercateringandevents.com`)"
      entryPoints:
        - websecure
      service: noop@internal
      middlewares:
        - gather-strip-www
      tls:
        certResolver: letsencrypt

    # Redirect alternate domain → primary
    gather-redirect:
      rule: "Host(`gathercafeandevents.com`) || Host(`www.gathercafeandevents.com`)"
      entryPoints:
        - websecure
      service: noop@internal
      tls:
        certResolver: letsencrypt
      middlewares:
        - gather-redirect-to-primary

  # ── Middlewares ───────────────────────────────────────────────────

  middlewares:
    gather-redirect-to-primary:
      redirectRegex:
        regex: "^https?://(?:www\\.)?gathercafeandevents\\.com(.*)"
        replacement: "https://gathercateringandevents.com${1}"
        permanent: true

    gather-strip-www:
      redirectRegex:
        regex: "^https?://www\\.gathercateringandevents\\.com(.*)"
        replacement: "https://gathercateringandevents.com${1}"
        permanent: true

    gather-hsts:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true

  # ── Services ─────────────────────────────────────────────────────

  services:
    gather-web:
      loadBalancer:
        servers:
          - url: "http://nginx:80"
